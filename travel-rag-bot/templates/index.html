<!DOCTYPE html>
<html>
<head>
    <title>Travel Info Bot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🚍 Travel Transport Info Bot</h1>

    <div id="chatbox"></div>

    <div class="input-area">
        <input 
            type="text" 
            id="userInput" 
            placeholder="Ask about routes, timings..."
            onkeypress="if(event.key === 'Enter') sendMessage()"
        >
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
